name: Deploy mdBook to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          manifest-path: pixi.toml

      - name: Install Mermaid assets
        run: pixi run mdbook-mermaid install .

      - name: Build site
        run: |
          pixi run build
          touch book/.nojekyll

      - name: Deploy built site to master
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ github.token }}
          publish_dir: ./book
          publish_branch: master
          commit_message: "Deploy mdBook site from ${{ github.sha }}"
