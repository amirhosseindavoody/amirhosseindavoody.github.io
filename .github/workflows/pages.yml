name: Deploy mdBook to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      source_sha:
        description: Commit on main to build and deploy
        required: true

permissions:
  contents: write
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-on-main:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync workflow to master
        run: git push --force origin HEAD:refs/heads/master

      - name: Trigger deployment on master
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run pages.yml \
            --ref master \
            -f source_sha="${{ github.sha }}"

  deploy-from-master:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout source commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_sha }}

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          manifest-path: pixi.toml

      - name: Install Mermaid assets
        run: pixi run mdbook-mermaid install .

      - name: Build site
        run: |
          pixi run build
          touch book/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
