name: Deploy mdBook to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify GitHub Pages is enabled
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh api "repos/${{ github.repository }}/pages" >/dev/null 2>&1; then
            echo "::error::GitHub Pages is not enabled for this repository."
            echo "Open Settings → Pages, choose GitHub Actions as the source, and save."
            echo "https://github.com/${{ github.repository }}/settings/pages"
            exit 1
          fi

      - name: Use GitHub Actions for Pages deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api -X PUT "repos/${{ github.repository }}/pages" \
            -f build_type=workflow

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          manifest-path: pixi.toml

      - name: Install Mermaid assets
        run: pixi run mdbook-mermaid install .

      - name: Build site
        run: |
          pixi run build
          touch book/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
