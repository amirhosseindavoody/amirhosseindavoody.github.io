name: Deploy mdBook to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify GitHub Pages uses GitHub Actions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/pages" > pages.json
          BUILD_TYPE=$(jq -r '.build_type // "legacy"' pages.json)
          echo "Pages build type: ${BUILD_TYPE}"
          if [ "${BUILD_TYPE}" != "workflow" ]; then
            echo "::error::GitHub Pages Source must be set to GitHub Actions."
            echo "Open Settings → Pages → Build and deployment → Source → GitHub Actions"
            echo "https://github.com/${{ github.repository }}/settings/pages"
            exit 1
          fi

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          manifest-path: pixi.toml

      - name: Install Mermaid assets
        run: pixi run mdbook-mermaid install .

      - name: Build site
        run: |
          pixi run build
          touch book/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
